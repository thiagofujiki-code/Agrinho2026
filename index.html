<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agro forte</title>
    <style>
        body {
            background-color: #1D4221; /* O verde escuro que estava no seu código */
            color: white;
            font-family: "Bai Jamjuree", sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            height: 100vh;
            display: flex;
            align-items: center; /* Alinha verticalmente no meio da página */
        }

        /* Container que segura os retângulos no lado esquerdo */
        .container-esquerdo {
            display: flex;
            flex-direction: column;
            gap: 20px; /* Espaço entre os elementos */
            margin-left: 50px; /* Afasta os retângulos da borda esquerda */
        }

        /* Estilização dos retângulos médios com pontas arredondadas */
        .retangulo {
            width: 300px;  
            height: 150px; 
            border-radius: 20px; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }

        .verde-claro {
            background-color: #64A712; /* O verde claro do seu botão original */
        }

        .laranja {
            background-color: #e67e22; /* Cor laranja */
        }

        /* Botão funcional totalmente verde e sem texto */
        .botao-link {
            display: inline-block;
            width: 60px;
            height: 60px;
            background-color: #27ae60; 
            border-radius: 50%; 
            border: none;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container-esquerdo">
        
        <div class="retangulo verde-claro"></div>
        
        <div class="retangulo laranja"></div>
        
        <a href="pagina2.html" target="_blank">
            <button class="botao-link" type="button"></button>
        </a>
        
    </div>

</body>
</html>
